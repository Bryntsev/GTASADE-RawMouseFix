body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing GTASADE Raw Mouse Fix. Please include enough setup details to compare results.
  - type: textarea
    id: result
    attributes:
      label: Result
      description: How did the mouse feel in gameplay and menus?
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Windows version, mouse, polling rate, FPS cap, display mode, and other mods.
    validations:
      required: true
title: "Test result"
